apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo-gated
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://stefanprodan.github.io/podinfo
    chart: podinfo
    targetRevision: 6.7.1
    helm:
      releaseName: 979f613702cad8de6cba515612f079edc3d7ffd1
      values: |
          note: podinfo via WO Git-as-Target
  destination:
    server: https://kubernetes.default.svc
    namespace: podinfo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
